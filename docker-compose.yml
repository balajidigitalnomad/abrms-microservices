services:
  mysql:
    image: mysql:8
    container_name: abrms-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin
    ports:
      - "3307:3306"
    networks:
      - abrms-networks
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-padmin" ]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    image: abrms-eureka-server:latest
    container_name: abrms-eureka-container
    restart: always

    environment:
      SPRING_PROFILES_ACTIVE: docker

    ports:
      - "8761:8761"

    networks:
      - abrms-networks

  kafka:
    image: apache/kafka:latest
    container_name: abrms-kafka-container

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw

    volumes:
      - kafka-data:/var/lib/kafka/data

    networks:
      - abrms-networks

    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 5

  user-service:
    image: abrms-user-service:latest
    container_name: abrms-user-container
    restart: always

    environment:
      SPRING_PROFILES_ACTIVE: docker

    ports:
      - "8081:8081"

    networks:
      - abrms-networks

    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy

  restaurant-service:
    image: abrms-restaurant-service:latest
    container_name: abrms-restaurant-container
    restart: always

    environment:
      SPRING_PROFILES_ACTIVE: docker

    ports:
      - "8082:8082"

    networks:
      - abrms-networks

    depends_on:
      - mysql
      - eureka-server
      - user-service

  api-gateway-service:
    image: abrms-api-gateway:latest
    container_name: abrms-api-gateway-container
    restart: always

    environment:
      SPRING_PROFILES_ACTIVE: docker

    ports:
      - "8080:8080"

    networks:
      - abrms-networks

    depends_on:
      - mysql
      - eureka-server
      - user-service
      - restaurant-service

networks:
  abrms-networks:
    driver: bridge

volumes:
  mysql-data:
    external: true
    name: f85bd92fd2aaeb277310daf9eedbc2d3374fa1a32fff6c25121aee1a5f31e062
  kafka-data:

